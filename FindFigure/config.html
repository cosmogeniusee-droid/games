<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка игры "Найди Фигуру!"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        img, svg { vertical-align: top; }
        .shape-card { background:#fff;border:2px solid #dee2e6;border-radius:10px;padding:8px 6px;text-align:center; }
        .shape-preview { width:52px;height:52px;margin:0 auto 4px; }
        .color-swatches { display:flex;flex-wrap:wrap;gap:3px;justify-content:center; }
        .swatch { width:26px;height:26px;border-radius:4px;cursor:pointer;position:relative;border:2px solid transparent;padding:2px;background:#e9ecef;transition:transform .1s;box-sizing:border-box; }
        .swatch:hover { transform:scale(1.2);z-index:1; }
        .swatch[data-state="0"] { opacity:.22; }
        .swatch[data-state="1"] { opacity:1;border-color:#555; }
        .swatch[data-state="2"] { opacity:1;border-color:#000;box-shadow:0 0 0 2px gold; }
        .swatch-badge { display:none;position:absolute;top:-7px;right:-7px;background:#27ae60;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;line-height:14px;text-align:center;font-weight:bold;pointer-events:none; }
        .swatch[data-state="2"] .swatch-badge { display:block; }
        .legend { font-size:.78rem;color:#666; }
        .legend span { display:inline-flex;align-items:center;gap:4px;margin-right:10px; }
        .dot { width:14px;height:14px;border-radius:3px;display:inline-block; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid py-3">
    <h1 class="mb-2 text-center">&#x2699;&#xFE0F; Конфигуратор "Найди Фигуру!"</h1>
    <div class="row g-3">
        <div class="col-lg-5 d-flex flex-column gap-3">
            <div class="card">
                <div class="card-body pb-2">
                    <h5 class="card-title mb-1">Фигуры и цвета</h5>
                    <p class="legend mb-2">
                        Нажмите на цвет фигуры:
                        <span><span class="dot border" style="background:#e9ecef;opacity:.3"></span>выкл.</span>
                        <span><span class="dot border border-dark" style="background:#e67e22"></span>отвлекающий</span>
                        <span><span class="dot border border-dark" style="background:#27ae60;box-shadow:0 0 0 2px gold"></span>&#x2713; искать</span>
                    </p>
                    <div id="shape-grid" class="row g-2 row-cols-3 row-cols-sm-4 row-cols-md-4"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Параметры поля</h5>
                    <div class="mb-3">
                        <label class="form-label">Размер поля: <strong id="gridSizeVal">7</strong>&times;<strong id="gridSizeVal2">7</strong></label>
                        <input type="range" id="gridSize" class="form-range" value="7" min="4" max="12">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Мин. кол-во каждой фигуры: <strong id="minVal">4</strong></label>
                        <input type="range" id="minOcc" class="form-range" value="4" min="1" max="20">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Макс. кол-во каждой фигуры: <strong id="maxVal">7</strong></label>
                        <input type="range" id="maxOcc" class="form-range" value="7" min="1" max="30">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Таймер (обратный отсчёт): <strong id="timeVal">выкл.</strong></label>
                        <input type="range" id="timeLimit" class="form-range" value="0" min="0" max="300" step="5">
                        <small class="text-muted">0 — без ограничений (считать вверх). Иначе — сколько секунд даётся на игру.</small>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Сгенерированная ссылка:</label>
                        <div class="input-group">
                            <input type="text" id="urlDisplay" class="form-control form-control-sm" readonly>
                            <button class="btn btn-outline-secondary btn-sm" id="copyBtn">Копировать</button>
                        </div>
                    </div>
                    <a id="gameLink" href="#" target="_blank" class="btn btn-success w-100">&#x1F680; Открыть игру</a>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card" style="min-height:500px;height:100%">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Превью</h5>
                    <div class="flex-grow-1 border rounded overflow-hidden" style="min-height:450px">
                        <iframe id="previewFrame" src="" title="Превью игры" class="w-100 h-100 border-0" style="min-height:450px"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
const SHAPE_KEYS = ['triangle','square','rectangle','circle','rhombus','hexagon','heart','star5','star6','parallelogram','trapezoid','ellipse'];
const COLORS = ['#4251f5', '#f22225', '#f2f222','#03a806','#f52fc7','#8e2ff5','#f5812f','#42f5e3'];


const states = {};
SHAPE_KEYS.forEach(s => { states[s] = {}; COLORS.forEach((_,i) => { states[s][i] = 0; }); });

const DEFAULT = [
    { s:'circle',   c:[0],  t:[]  },
    { s:'triangle', c:[2],  t:[]  },
    { s:'square',   c:[7],  t:[7] }
];
DEFAULT.forEach(fc => { const tSet = new Set(fc.t); fc.c.forEach(col => { states[fc.s][col] = tSet.has(col) ? 2 : 1; }); });

function starPts(cx,cy,outerR,innerR,n){return Array.from({length:n*2},(_,i)=>{const r=i%2===0?outerR:innerR,a=(i*Math.PI/n)-Math.PI/2;return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');}
function hexPts(cx,cy,r){return Array.from({length:6},(_,i)=>{const a=(i*60-30)*Math.PI/180;return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');}
function shapeSVG(shape,color){
    const fill=color==='gray-preview'?'#bbb':(COLORS[color]||'#aaa'),stroke='rgba(0,0,0,0.18)',sw=3;
    let body='';
    switch(shape){
        case 'triangle':     body=`<polygon points="50,7 93,90 7,90" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'square':       body=`<rect x="10" y="10" width="80" height="80" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'rectangle':    body=`<rect x="5" y="22" width="90" height="56" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'circle':       body=`<circle cx="50" cy="50" r="43" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'rhombus':      body=`<polygon points="50,5 95,50 50,95 5,50" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'hexagon':      body=`<polygon points="${hexPts(50,50,44)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'heart':        body=`<path d="M50,78 C18,60 5,35 5,25 C5,11 16,5 28,5 C37,5 44,11 50,20 C56,11 63,5 72,5 C84,5 95,11 95,25 C95,35 82,60 50,78 Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'star5':        body=`<polygon points="${starPts(50,50,46,18,5)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'star6':        body=`<polygon points="${starPts(50,50,46,22,6)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'parallelogram':body=`<polygon points="22,88 10,12 78,12 90,88" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'trapezoid':    body=`<polygon points="10,88 90,88 70,12 30,12" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        case 'ellipse':      body=`<ellipse cx="50" cy="50" rx="47" ry="28" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;break;
        default:             body=`<circle cx="50" cy="50" r="43" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    }
    return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}

function renderShapeCards(){
    const grid=document.getElementById('shape-grid');
    grid.innerHTML='';
    SHAPE_KEYS.forEach(shape=>{
        const col=document.createElement('div');col.className='col';
        const card=document.createElement('div');card.className='shape-card';
        const preview=document.createElement('div');preview.className='shape-preview';preview.innerHTML=shapeSVG(shape,'gray-preview');
        const swatchRow=document.createElement('div');swatchRow.className='color-swatches';
        COLORS.forEach((hex,i)=>{
            const sw=document.createElement('div');
            sw.className='swatch';sw.dataset.state=states[shape][i];
            sw.innerHTML=shapeSVG(shape,i)+'<span class="swatch-badge">&#x2713;</span>';
            sw.addEventListener('click',()=>{
                const next=(parseInt(sw.dataset.state)+1)%3;
                sw.dataset.state=next;states[shape][i]=next;updateLink();
            });
            swatchRow.appendChild(sw);
        });
        card.appendChild(preview);card.appendChild(swatchRow);
        col.appendChild(card);grid.appendChild(col);
    });
}

function buildConfig(){
    const result=[];
    SHAPE_KEYS.forEach(shape=>{
        const available=[],targets=[];
        COLORS.forEach((_,i)=>{const st=states[shape][i];if(st>=1)available.push(i);if(st===2)targets.push(i);});
        if(available.length>0)result.push({s:shape,c:available,t:targets});
    });
    return result;
}

const gridSizeEl=document.getElementById('gridSize');
const minOccEl=document.getElementById('minOcc');
const maxOccEl=document.getElementById('maxOcc');
const timeLimitEl=document.getElementById('timeLimit');
const urlDisplay=document.getElementById('urlDisplay');
const gameLink=document.getElementById('gameLink');
const copyBtn=document.getElementById('copyBtn');
const previewFrame=document.getElementById('previewFrame');

function formatTimeLabel(v){
    if(v===0||v==='0')return 'выкл.';
    const s=parseInt(v);
    const m=Math.floor(s/60),sec=s%60;
    return m>0?(sec>0?`${m} мин ${sec} сек`:`${m} мин`):`${sec} сек`;
}

function updateLink(){
    if(parseInt(maxOccEl.value)<parseInt(minOccEl.value)){maxOccEl.value=minOccEl.value;document.getElementById('maxVal').textContent=maxOccEl.value;}
    const config=buildConfig(),params=new URLSearchParams();
    if(config.length>0)params.set('config',config.map(fc=>`${SHAPE_KEYS.indexOf(fc.s)}-${fc.c.join('_')}-${fc.t.join('_')}`).join('.'));
    if(gridSizeEl.value!=='7')params.set('gridSize',gridSizeEl.value);
    if(minOccEl.value!=='4')params.set('min',minOccEl.value);
    if(maxOccEl.value!=='7')params.set('max',maxOccEl.value);
    if(timeLimitEl.value!=='0')params.set('time',timeLimitEl.value);
    const qs=params.toString(),previewUrl=qs?`index.html?${qs}`:'index.html';
    const fullUrl=`https://cosmogeniusee-droid.github.io/games/FindFigure/${previewUrl}`;
    urlDisplay.value=fullUrl;gameLink.href=previewUrl;previewFrame.src=previewUrl;
}

function updateSliderDisplays(){
    document.getElementById('gridSizeVal').textContent=gridSizeEl.value;
    document.getElementById('gridSizeVal2').textContent=gridSizeEl.value;
    document.getElementById('minVal').textContent=minOccEl.value;
    document.getElementById('maxVal').textContent=maxOccEl.value;
    document.getElementById('timeVal').textContent=formatTimeLabel(timeLimitEl.value);
}

[gridSizeEl,minOccEl,maxOccEl,timeLimitEl].forEach(el=>el.addEventListener('input',()=>{updateSliderDisplays();updateLink();}));
copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(urlDisplay.value).then(()=>{const o=copyBtn.textContent;copyBtn.textContent='Скопировано!';setTimeout(()=>{copyBtn.textContent=o;},2000);}).catch(e=>console.error(e));});

renderShapeCards();
updateSliderDisplays();
updateLink();
</script>
</body>
</html>
